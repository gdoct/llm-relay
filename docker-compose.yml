services:
  llm-relay-server:
    build:
      context: .
      # Build with host networking so RUN steps inherit the host's DNS.
      network: host
    image: llm-relay-server
    restart: unless-stopped
    ports:
      - "1234:1234"   # consumers (WSL) connect here
      - "1235:1235"   # Mac relay client (WebSocket) connects here
    volumes:
      - ./server-config.yaml:/config/server-config.yaml:ro
